niches:
  - name: "Authentic Cultural Scenes"
    weight: 0.35
    recent_cooldown_days: 3
    base_prompts:
      - "Traditional Thai hand-woven silk on a wooden floor loom, extreme close-up of interlaced warp and weft threads in deep crimson and gold, textile craft macro photography, shallow depth of field, no people"
      - "Antique Thai lacquerware box lid with gold leaf inlay on matte black surface, macro detail of intricate floral geometric pattern, product photography on dark velvet, no people"
      - "Dried kaffir lime leaves and galangal root arranged on weathered stone mortar, macro ingredient photography, soft top-down natural light, culinary craft concept, no people"
      - "Traditional palm leaf manuscript fragment with ancient script inscription, macro texture photography, warm amber light, aged organic material detail, no people"
    constraints:
      no_artist_names: true
      no_real_faces: true
      no_brand_logos: true

